<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>微商城</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FF5A3C">
<style>
:root{
--primary:#FF5A3C;--primary-dark:#E8492D;--primary-soft:#FFF1ED;
--accent:#FF8C42;
--bg:#F6F7F9;--card:#fff;--text:#16181D;--text-secondary:#7A828E;--muted:#9AA1AC;
--border:#EDEFF2;--success:#10B981;--danger:#EF4444;
--shadow-sm:0 1px 3px rgba(20,24,40,.06);
--shadow:0 6px 20px rgba(20,24,40,.08);
--shadow-lg:0 12px 32px rgba(20,24,40,.12);
--radius:16px;--radius-sm:12px;--radius-lg:22px;--nav-height:64px;
--grad:linear-gradient(135deg,#FF6B4A 0%,#FF8C42 100%);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:var(--nav-height);position:relative;overflow:hidden;background:var(--bg)}
.page{display:none;padding:16px;animation:fadeIn .3s cubic-bezier(.22,.61,.36,1)}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px;background:var(--grad);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(255,90,60,.25)}
.header h1{font-size:19px;font-weight:700;letter-spacing:.3px}
.header-icon{font-size:22px;cursor:pointer;padding:4px}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.product-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;border:1px solid var(--border)}
.product-card:active{transform:scale(.97)}
.product-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.product-card img{width:100%;height:160px;object-fit:contain;background:linear-gradient(180deg,#fff,#F7F8FA);display:block;padding:8px}
.product-card img[src*="kfc"]{object-fit:cover;padding:0;transform:scale(1)}
.product-card .info{padding:10px 12px 14px}
.product-card .name{font-size:14px;font-weight:600;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px;line-height:1.45}
.product-card .price{font-size:19px;font-weight:800;color:var(--primary);display:flex;align-items:baseline;gap:1px}
.product-card .price .unit{font-size:12px;font-weight:500}
.product-card .sales{font-size:11px;color:var(--muted);margin-top:4px}
.categories{display:flex;gap:8px;padding:14px 2px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.categories::-webkit-scrollbar{display:none}
.cat-tag{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;background:var(--card);color:var(--text-secondary);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.cat-tag.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(255,90,60,.3);font-weight:600}
.banner{background:var(--grad);border-radius:var(--radius-lg);padding:22px 22px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(255,90,60,.28)}
.banner h2{font-size:21px;font-weight:800;margin-bottom:4px;letter-spacing:.3px}
.banner p{font-size:13px;opacity:.92}
.banner::after{content:'';position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:rgba(255,255,255,.12);border-radius:50%}
.banner::before{content:'';position:absolute;right:30px;bottom:-40px;width:90px;height:90px;background:rgba(255,255,255,.08);border-radius:50%}
.store-list{display:flex;flex-direction:column;gap:14px}
.store-card{display:flex;gap:14px;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;padding:14px;border:1px solid var(--border);position:relative}
.store-card:active{transform:scale(.985)}
.store-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.store-card::after{content:'›';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:24px;font-weight:300}
.store-card img{width:92px;height:92px;border-radius:14px;object-fit:cover;background:#F7F8FA;flex-shrink:0;box-shadow:var(--shadow-sm)}
.store-card .sinfo{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding-right:18px}
.store-card .sname{font-size:17px;font-weight:800;margin-bottom:6px;letter-spacing:.2px}
.store-card .sdesc{font-size:12.5px;color:var(--text-secondary);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.store-card .smeta{font-size:11px;color:var(--muted);display:flex;gap:10px;align-items:center}
.store-card .sbadge{background:var(--primary-soft);color:var(--primary-dark);padding:3px 10px;border-radius:10px;font-weight:700}
.store-header{display:flex;align-items:center;gap:14px;padding:18px;background:var(--grad);color:#fff;border-radius:var(--radius);margin-bottom:16px;box-shadow:0 8px 22px rgba(255,90,60,.28);position:relative;overflow:hidden}
.store-header::after{content:'';position:absolute;right:-20px;top:-20px;width:90px;height:90px;background:rgba(255,255,255,.12);border-radius:50%}
.store-header img{width:62px;height:62px;border-radius:14px;object-fit:cover;flex-shrink:0;border:2.5px solid rgba(255,255,255,.7);box-shadow:0 4px 12px rgba(0,0,0,.15);position:relative;z-index:1}
.store-header h2{font-size:19px;font-weight:800;margin-bottom:3px;letter-spacing:.3px}
.store-header p{font-size:12.5px;opacity:.92}
.cart-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);gap:14px}
.cart-item img{width:72px;height:72px;border-radius:12px;object-fit:contain;background:#F7F8FA;flex-shrink:0;padding:4px}
.cart-item .cinfo{flex:1;min-width:0}
.cart-item .cname{font-size:14px;font-weight:600;margin-bottom:4px}
.cart-item .cprice{font-size:17px;font-weight:800;color:var(--primary)}
.qty-ctrl{display:flex;align-items:center;gap:10px;margin-top:8px}
.qty-ctrl button{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--card);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .15s}
.qty-ctrl button:active{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}
.qty-ctrl span{min-width:26px;text-align:center;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .16s;letter-spacing:.3px}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 6px 16px rgba(255,90,60,.32)}
.btn-outline{border:1.5px solid var(--primary);color:var(--primary);background:transparent}
.btn-block{width:100%;padding:15px;font-size:16px;border-radius:28px}
.btn-sm{padding:7px 15px;font-size:12px;border-radius:16px}
.cart-bar{position:fixed;bottom:var(--nav-height);left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);padding:14px 18px;box-shadow:0 -4px 20px rgba(20,24,40,.08);display:flex;align-items:center;justify-content:space-between;z-index:99;border-top:1px solid var(--border)}
.cart-bar .total{font-weight:600;font-size:15px;color:var(--text-secondary)}
.cart-bar .total .price{color:var(--primary);font-size:22px;font-weight:800}
.empty-state{text-align:center;padding:72px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:64px;margin-bottom:18px;opacity:.45}
.empty-state p{font-size:14px;margin-bottom:18px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px}
.form-group input,.form-group textarea{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;background:var(--card);transition:border .2s,box-shadow .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.order-card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.order-card .oid{font-size:12px;color:var(--muted);margin-bottom:8px}
.order-card .oproducts{font-size:13px;color:var(--text-secondary);margin-bottom:10px;line-height:1.6}
.order-card .ototal{font-size:19px;font-weight:800;color:var(--primary)}
.order-card .ostatus{display:inline-block;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700;margin-top:8px}
.ostatus.pending{background:#FEF3C7;color:#D97706}
.ostatus.done{background:#D1FAE5;color:#059669}
.profile-menu{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.profile-item{display:flex;align-items:center;justify-content:space-between;padding:17px 18px;border-bottom:1px solid var(--border);cursor:pointer;font-size:15px;font-weight:500;transition:background .15s}
.profile-item:last-child{border-bottom:none}
.profile-item:active{background:var(--primary-soft)}
.profile-item .arrow{color:var(--muted);font-size:18px}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:rgba(22,24,29,.92);backdrop-filter:blur(8px);color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;z-index:999;animation:slideDown .3s ease;pointer-events:none;box-shadow:var(--shadow-lg)}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.qr-section{text-align:center;padding:40px 20px}
.qr-section img{border-radius:18px;box-shadow:var(--shadow)}
.qr-section p{color:var(--text-secondary);font-size:13px;margin:16px 0 8px}
.qr-section .url{font-size:12px;color:var(--primary);word-break:break-all}
.badge{position:absolute;top:-5px;right:-7px;background:var(--danger);color:#fff;font-size:10px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 2px 6px rgba(239,68,68,.4);border:1.5px solid #fff}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:rgba(255,255,255,.94);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border-top:1px solid var(--border);z-index:100;height:var(--nav-height);box-shadow:0 -2px 16px rgba(20,24,40,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10.5px;font-weight:500;color:var(--muted);cursor:pointer;position:relative;transition:color .15s}
.nav-item.active{color:var(--primary);font-weight:700}
.nav-item .ni{font-size:22px;margin-bottom:3px;transition:transform .15s}
.nav-item.active .ni{transform:scale(1.08)}
.back-btn{position:sticky;top:0;z-index:99;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:14px 16px;display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;cursor:pointer;border-bottom:1px solid var(--border)}
.back-btn:active{background:var(--primary-soft)}
.detail-img{display:block;width:100%;max-height:62vh;object-fit:contain;background:#fff;border-radius:var(--radius);margin:0 auto 18px;box-shadow:var(--shadow-sm)}
.detail-name{font-size:21px;font-weight:800;margin-bottom:10px;letter-spacing:.2px}
.detail-price{font-size:30px;font-weight:800;color:var(--primary);margin-bottom:18px}
.detail-price .unit{font-size:14px;font-weight:500}
.detail-desc{font-size:14px;color:var(--text-secondary);line-height:1.85;margin-bottom:24px}
.detail-actions{display:flex;gap:12px;position:fixed;bottom:var(--nav-height);left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:14px 16px;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);box-shadow:0 -4px 20px rgba(20,24,40,.08);z-index:99;border-top:1px solid var(--border)}
.detail-actions .btn{flex:1;padding:15px;font-size:16px}
body.detail-mode .bottom-nav{display:none}
body.detail-mode #app{padding-bottom:84px}
.page#page-detail{padding:0}
.page#page-detail .back-btn{padding:14px 16px}
.page#page-detail #detailContent{padding:0 16px}
</style>
</head>
<body>
<div id="app">
<div class="page active" id="page-home">
<div class="banner"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h2>💧 Rosa 水 & 可乐 & KFC</h2><p>品质饮品 · 美食直达</p></div><div onclick="showQR()" style="background:rgba(255,255,255,.25);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;margin-top:4px">📱</div></div></div>
<div class="store-list" id="storeList"></div>
</div>
<div class="page" id="page-store"><div class="back-btn" onclick="navigate('home')">← 返回店铺列表</div><div style="padding:16px"><div class="store-header" id="storeHeader"></div><div class="categories" id="categories"></div><div class="product-grid" id="productGrid"></div></div></div>
<div class="page" id="page-detail"><div class="back-btn" onclick="navigate('store')">← 返回</div><div id="detailContent"></div><div class="detail-actions" id="detailActions"></div></div>
<div class="page" id="page-cart"><div id="cartContent"></div></div>
<div class="page" id="page-checkout"><div class="back-btn" onclick="navigate('cart')">← 返回购物车</div><div style="padding:16px"><h2 style="font-size:20px;margin-bottom:20px">确认订单</h2><div id="checkoutItems" style="margin-bottom:20px"></div><div class="form-group"><label>收货人</label><input id="inputName" placeholder="请输入姓名"></div><div class="form-group"><label>手机号</label><input id="inputPhone" type="tel" placeholder="请输入手机号"></div><div class="form-group"><label>收货地址</label><textarea id="inputAddress" rows="2" placeholder="请输入详细地址"></textarea></div><div class="form-group"><label>打赏骑手（дин.）</label><input id="inputTipRider" type="number" min="0" step="1" value="0" placeholder="默认 0"></div><div class="form-group"><label>打赏商家（дин.）</label><input id="inputTipMerchant" type="number" min="0" step="1" value="0" placeholder="默认 0"></div><div class="form-group"><label>备注（选填）</label><input id="inputNote" placeholder="有什么需要备注的吗？"></div><button class="btn btn-primary btn-block" onclick="submitOrder(this)">提交订单</button></div></div>
<div class="page" id="page-orders"><div id="ordersContent"></div></div>
<div class="page" id="page-profile" style="padding-top:0"><div class="header"><h1>我的</h1><span></span></div><div style="padding:16px"><div class="profile-menu"><div class="profile-item" onclick="navigate('orders')"><span>📋 我的订单</span><span class="arrow">›</span></div><div class="profile-item" onclick="navigate('cart')"><span>🛒 购物车 <span id="cartCountInline" style="color:var(--primary);font-weight:600"></span></span><span class="arrow">›</span></div><div class="profile-item" onclick="showQR()"><span>📱 分享二维码</span><span class="arrow">›</span></div><div class="profile-item" onclick="toggleNotifySettings()"><span>🔔 订单通知设置</span><span class="arrow" id="notifyArrow">›</span></div><div class="profile-item"><span>📊 订单自动同步</span><span style="font-size:12px;color:var(--success);font-weight:700">已开启</span></div></div><div class="qr-section" id="qrSection" style="display:none"><h3 style="margin-bottom:20px">扫一扫访问商城</h3><img id="qrImg" src="" alt="QR Code" style="width:200px;height:200px" crossorigin="anonymous"><p>将二维码分享给朋友</p><p class="url" id="qrUrl"></p></div><div class="qr-section" id="notifySettings" style="display:none"><h3 style="margin-bottom:8px">🔔 订单通知设置（PushPlus）</h3><p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">顾客下单后，微信即时推送到你手机 · 已预填你的 Token</p><div class="form-group"><label>PushPlus Token</label><input id="sendKeyInput" placeholder="默认已配置，无需修改" style="font-size:13px"></div><button class="btn btn-primary btn-block" onclick="saveNotifyKey()" style="margin-bottom:8px">保存</button><p style="font-size:11px;color:var(--text-secondary);text-align:center">需要新的 Token？去 <a href="https://www.pushplus.plus/" target="_blank" style="color:var(--primary)">pushplus.plus</a> 注册获取</p><p class="url" id="notifyStatus" style="margin-top:8px;color:var(--success)">✅ 已预配置，开箱即用</p></div></div></div></div>
</div>
<nav class="bottom-nav">
<div class="nav-item active" data-page="home" onclick="navigate('home')"><span class="ni">🏠</span>首页</div>
<div class="nav-item" data-page="cart" onclick="navigate('cart')"><span class="ni" style="position:relative">🛒<span class="badge" id="cartBadge" style="display:none">0</span></span>购物车</div>
<div class="nav-item" data-page="profile" onclick="navigate('profile')"><span class="ni">👤</span>我的</div>
</nav>
<div id="toast" class="toast" style="display:none"></div>
<div id="qrModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center" onclick="if(event.target===this)closeQR()"><div style="background:var(--card);border-radius:var(--radius);padding:24px;text-align:center;max-width:320px;width:90%"><h3 style="margin-bottom:8px">扫码进入店铺</h3><p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">截图分享给朋友，扫码即达</p><img id="qrModalImg" src="" alt="QR Code" style="width:200px;height:200px;border-radius:12px;box-shadow:var(--shadow)"><p class="url" id="qrModalUrl" style="margin-top:12px"></p><button class="btn btn-primary" onclick="closeQR()" style="margin-top:16px;padding:8px 32px">关闭</button></div></div>
<script>

let currentStore=null;

function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',1800);}
function updateBadge(){let b=document.getElementById('cartBadge'),c=document.getElementById('cartCountInline'),n=cart.reduce((s,i)=>s+i.qty,0);if(n>0){b.style.display='flex';b.textContent=n>99?'99+':n;if(c)c.textContent='('+n+')';}else{b.style.display='none';if(c)c.textContent='';}}
function navigate(page,data){document.body.classList.toggle('detail-mode',page==='detail');document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));let p=document.getElementById('page-'+page);if(p)p.classList.add('active');let ni=document.querySelector('.nav-item[data-page="'+page+'"]');if(ni)ni.classList.add('active');window.scrollTo(0,0);if(page==='home')renderHome();if(page==='store')renderStore();if(page==='cart')renderCart();if(page==='profile')updateBadge();if(page==='orders')renderOrders();}
function renderHome(){document.getElementById('storeList').innerHTML=STORES.map(st=>{let items=PRODUCTS.filter(p=>p.store===st.id);let total=items.reduce((a,b)=>a+b.sales,0);return '<div class="store-card" onclick="openStore(\''+st.id+'\')">'+'<img src="'+st.cover+'" alt="'+st.name+'" loading="lazy">'+'<div class="sinfo"><div class="sname">'+st.name+'</div>'+'<div class="sdesc">'+st.desc+'</div>'+'<div class="smeta"><span class="sbadge">'+items.length+' 件商品</span><span>已售 '+total+' 件</span></div>'+'</div></div>';}).join('');}
function renderStore(){let st=STORES.find(x=>x.id===currentStore);if(!st)return;document.getElementById('storeHeader').innerHTML='<img src="'+st.cover+'" alt="'+st.name+'"><div><h2>'+st.name+'</h2><p>'+st.desc+'</p></div>';let prods=PRODUCTS.filter(p=>p.store===currentStore);if(currentCat!=='全部')prods=prods.filter(p=>p.cat===currentCat);document.getElementById('productGrid').innerHTML=prods.map(p=>'<div class="product-card" onclick="openDetail('+p.id+')"><img src="'+p.img+'" alt="'+p.name+'" loading="lazy"><div class="info"><div class="name">'+p.name+'</div><div class="price"><span class="unit">дин.</span>'+p.price+'</div><div class="sales">已售 '+(p.sales>999?(p.sales/1000).toFixed(1)+'k':p.sales)+' 件</div></div></div>').join('');let cats=st.cats;document.getElementById('categories').innerHTML=cats.map(c=>'<div class="cat-tag'+(c===currentCat?' active':'')+'" onclick="switchCat(\''+c+'\')">'+c+'</div>').join('');}
function openStore(id){currentStore=id;currentCat='全部';navigate('store');}
function switchCat(cat){currentCat=cat;renderStore();}
function openDetail(id){let p=PRODUCTS.find(x=>x.id===id);if(!p)return;document.getElementById('detailContent').innerHTML='<img class="detail-img" src="'+p.img+'" alt="'+p.name+'"><div class="detail-name">'+p.name+'</div><div class="detail-price"><span class="unit">дин.</span>'+p.price+'</div><div class="detail-desc">'+p.desc+'</div><div style="font-size:12px;color:var(--text-secondary)">已售 '+(p.sales>999?(p.sales/1000).toFixed(1)+'k':p.sales)+' 件</div>';let existing=cart.find(c=>c.id===id);document.getElementById('detailActions').innerHTML=existing?'<button class="btn btn-outline" onclick="removeFromCart('+id+');openDetail('+id+')">移出购物车</button><button class="btn btn-primary" onclick="navigate(\'cart\')">去购物车结算</button>':'<button class="btn btn-outline" onclick="addToCart('+id+');openDetail('+id+')">加入购物车</button><button class="btn btn-primary" onclick="addToCart('+id+');navigate(\'cart\')">立即购买</button>';navigate('detail');}
function addToCart(id){let exist=cart.find(c=>c.id===id);if(exist)exist.qty++;else cart.push({id:id,qty:1});saveCart();toast('已加入购物车');}
function removeFromCart(id){cart=cart.filter(c=>c.id!==id);saveCart();}
function updateQty(id,d){let item=cart.find(c=>c.id===id);if(!item)return;item.qty+=d;if(item.qty<=0)cart=cart.filter(c=>c.id!==id);saveCart();renderCart();}
function renderCart(){let el=document.getElementById('cartContent');if(cart.length===0){el.innerHTML='<div class="header"><h1>购物车</h1><span></span></div><div class="empty-state"><div class="icon">🛒</div><p>购物车还是空的</p><button class="btn btn-primary" onclick="navigate(\'home\')">去逛逛</button></div>';return;}
let html='<div class="header"><h1>购物车</h1><span></span></div><div style="padding:16px;padding-bottom:80px">',total=0;
cart.forEach(c=>{let p=PRODUCTS.find(x=>x.id===c.id);if(!p)return;let st=p.price*c.qty;total+=st;html+='<div class="cart-item"><img src="'+p.img+'" alt="'+p.name+'"><div class="cinfo"><div class="cname">'+p.name+'</div><div class="cprice">дин.'+st+'</div><div class="qty-ctrl"><button onclick="updateQty('+c.id+',-1)">−</button><span>'+c.qty+'</span><button onclick="updateQty('+c.id+',1)">+</button></div></div></div>';});
html+='</div><div class="cart-bar"><div class="total">合计：<span class="price">дин.'+total+'</span></div><button class="btn btn-primary" onclick="navigate(\'checkout\')">去结算</button></div>';el.innerHTML=html;}
function renderOrders(){let el=document.getElementById('ordersContent');if(orders.length===0){el.innerHTML='<div class="header"><h1>我的订单</h1><span></span></div><div class="empty-state"><div class="icon">📋</div><p>还没有订单</p><button class="btn btn-primary" onclick="navigate(\'home\')">去逛逛</button></div>';return;}
let html='<div class="header"><h1>我的订单</h1><span></span></div><div style="padding:16px">';
orders.slice().reverse().forEach(o=>{let items=o.items.map(ci=>{let p=PRODUCTS.find(x=>x.id===ci.id);return p?p.name+' x'+ci.qty:'商品';}).join('、');let syncText=o.sheetSync==='pending'?'表格待同步':o.sheetSync==='failed'?'表格同步失败，联网后重试':'表格已发送';let syncColor=o.sheetSync==='pending'||o.sheetSync==='failed'?'#D97706':'#059669';html+='<div class="order-card"><div class="oid">订单号：'+o.id+'</div><div class="oproducts">'+items+'</div><div class="ototal">дин.'+o.total+'</div>'+((o.tipRider||o.tipMerchant)?'<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">\u5546\u54c1 \u0434\u0438\u043d.'+(o.goodsTotal||o.total)+' · \u6253\u8d4f\u9a91\u624b \u0434\u0438\u043d.'+(o.tipRider||0)+' · \u6253\u8d4f\u5546\u5bb6 \u0434\u0438\u043d.'+(o.tipMerchant||0)+'</div>':'')+'<div class="ostatus pending">'+(o.status==='pending'?'待处理':'已完成')+'</div><div style="font-size:11px;color:'+syncColor+';font-weight:700;margin-top:6px">📊 '+syncText+'</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px">'+o.name+' · '+o.phone+' · '+o.address+'</div></div>';});
html+='</div>';el.innerHTML=html;}
async function submitOrder(button){let name=document.getElementById('inputName').value.trim(),phone=document.getElementById('inputPhone').value.trim(),address=document.getElementById('inputAddress').value.trim(),note=document.getElementById('inputNote').value.trim(),tipRider=Math.max(0,Number(document.getElementById('inputTipRider').value||0)),tipMerchant=Math.max(0,Number(document.getElementById('inputTipMerchant').value||0));if(!name||!phone||!address){toast('\u8bf7\u586b\u5199\u5b8c\u6574\u4fe1\u606f');return;}if(cart.length===0){toast('\u8d2d\u7269\u8f66\u4e3a\u7a7a');return;}if(button){button.disabled=true;button.textContent='提交中…';}
let goodsTotal=cart.reduce((s,c)=>{let p=PRODUCTS.find(x=>x.id===c.id);return p?s+p.price*c.qty:s;},0),total=goodsTotal+tipRider+tipMerchant;
let order={id:'ORD'+Date.now().toString(36).toUpperCase(),items:[...cart.map(c=>({id:c.id,qty:c.qty}))],goodsTotal:goodsTotal,tipRider:tipRider,tipMerchant:tipMerchant,total:total,name:name,phone:phone,address:address,note:note,status:'pending',sheetSync:'pending',createdAt:new Date().toISOString()};
orders.push(order);saveOrders();cart=[];saveCart();sendNotification(order);let synced=await queueAndSyncOrder(order);order.sheetSync=synced?'sent':'pending';saveOrders();
document.getElementById('inputName').value='';document.getElementById('inputPhone').value='';document.getElementById('inputAddress').value='';document.getElementById('inputTipRider').value='0';document.getElementById('inputTipMerchant').value='0';document.getElementById('inputNote').value='';
if(button){button.disabled=false;button.textContent='提交订单';}toast(synced?'下单成功，订单已发送到表格':'下单成功，表格将在联网后自动重试');navigate('orders');}
function toggleNotifySettings(){let s=document.getElementById('notifySettings');if(s.style.display==='block'){s.style.display='none';document.getElementById('notifyArrow').textContent='›'}else{s.style.display='block';document.getElementById('notifyArrow').textContent='⌄';document.getElementById('sendKeyInput').value=localStorage.getItem('sendkey')||'';document.getElementById('notifyStatus').textContent=localStorage.getItem('sendkey')?'✅ 已配置通知':'';setTimeout(()=>s.scrollIntoView({behavior:'smooth'}),100)}}
const DEFAULT_SHEETS_URL='https://script.google.com/macros/s/AKfycbwSnIauY2BrEwbiN7A6Bloo-GJiYBmU94CeItANHVY_Hyjyk-JHw3lSZPEtKC7F7ue9AQ/exec';
const SHEETS_OUTBOX_KEY='shop_sheets_outbox_v2';
let sheetsFlushChain=Promise.resolve();
function saveNotifyKey(){let key=document.getElementById('sendKeyInput').value.trim();if(key){localStorage.setItem('sendkey',key);document.getElementById('notifyStatus').textContent='✅ 通知已就绪！';toast('SendKey 已保存')}else{localStorage.removeItem('sendkey');document.getElementById('notifyStatus').textContent='';toast('SendKey 已清除')}}
function loadSheetsOutbox(){try{let value=JSON.parse(localStorage.getItem(SHEETS_OUTBOX_KEY)||'[]');return Array.isArray(value)?value:[]}catch(e){return[]}}
function saveSheetsOutbox(value){localStorage.setItem(SHEETS_OUTBOX_KEY,JSON.stringify(value))}
function queueSheetsOrder(order){let outbox=loadSheetsOutbox().filter(item=>item.id!==order.id);outbox.push(JSON.parse(JSON.stringify(order)));saveSheetsOutbox(outbox)}
function buildSheetsPayload(order){let itemRows=order.items.map(i=>{let p=PRODUCTS.find(x=>x.id===i.id);let unitPrice=p?p.price:0;return{productId:i.id,name:p?p.name:'商品',store:p?p.store:'',qty:i.qty,unitPrice:unitPrice,subtotal:unitPrice*i.qty}});let items=itemRows.map(i=>i.name+' x'+i.qty+' = '+i.subtotal+' \u0434\u0438\u043d.').join('\uff1b');return{createdAt:order.createdAt,orderId:order.id,name:order.name,phone:order.phone,address:order.address,items:items,itemRows:itemRows,goodsTotal:order.goodsTotal||order.total,tipRider:order.tipRider||0,tipMerchant:order.tipMerchant||0,total:order.total,note:order.note||'',status:'\u5f85\u5904\u7406',source:window.location.href.split('?')[0]}}
async function sendToSheets(order){try{await fetch(DEFAULT_SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(buildSheetsPayload(order)),keepalive:true,cache:'no-store'});return true}catch(e){console.log('Sheets\u5199\u5165\u5931\u8d25:',e);return false}}
function flushPendingSheets(targetId){let didSyncTarget=false;sheetsFlushChain=sheetsFlushChain.then(async()=>{let pending=loadSheetsOutbox(),remaining=[],syncedIds=[];for(let i=0;i<pending.length;i++){if(i>=10){remaining.push(pending[i]);continue}let ok=await sendToSheets(pending[i]);if(ok){syncedIds.push(pending[i].id);if(pending[i].id===targetId)didSyncTarget=true}else remaining.push(pending[i])}saveSheetsOutbox(remaining);if(syncedIds.length){orders.forEach(o=>{if(syncedIds.includes(o.id))o.sheetSync='sent'});saveOrders();if(document.getElementById('page-orders').classList.contains('active'))renderOrders()}}).catch(e=>console.log('Sheets\u91cd\u8bd5\u5931\u8d25:',e));return sheetsFlushChain.then(()=>didSyncTarget)}
async function queueAndSyncOrder(order){queueSheetsOrder(order);return flushPendingSheets(order.id)}
window.addEventListener('online',()=>flushPendingSheets());
localStorage.removeItem('sheets_url');
async function sendNotification(order){let key=localStorage.getItem('sendkey')||'52e09d6ddca34287bd7bb9188204b805';try{let items='';order.items.forEach(i=>{let p=PRODUCTS.find(x=>x.id===i.id);if(p)items+=p.name+' x'+i.qty+'  \u0434\u0438\u043d.'+(p.price*i.qty)+'<br>'});let content='<h3>\u65b0\u8ba2\u5355\u901a\u77e5</h3><p><b>\u8ba2\u5355\u53f7\uff1a</b>'+order.id+'</p><p><b>\u65f6\u95f4\uff1a</b>'+new Date().toLocaleString()+'</p><p><b>\u6536\u8d27\u4eba\uff1a</b>'+order.name+'</p><p><b>\u7535\u8bdd\uff1a</b>'+order.phone+'</p><p><b>\u5730\u5740\uff1a</b>'+order.address+'</p>'+(order.note?'<p><b>\u5907\u6ce8\uff1a</b>'+order.note+'</p>':'')+'<h4>\u5546\u54c1\u660e\u7ec6</h4><p>'+items+'</p><p><b>\u5546\u54c1\u91d1\u989d\uff1a</b>\u0434\u0438\u043d.'+(order.goodsTotal||order.total)+'</p><p><b>\u6253\u8d4f\u9a91\u624b\uff1a</b>\u0434\u0438\u043d.'+(order.tipRider||0)+'</p><p><b>\u6253\u8d4f\u5546\u5bb6\uff1a</b>\u0434\u0438\u043d.'+(order.tipMerchant||0)+'</p><h4>\u5408\u8ba1\uff1a\u0434\u0438\u043d.'+order.total+'</h4>';await fetch('https://www.pushplus.plus/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:key,title:'\u65b0\u8ba2\u5355 \u0434\u0438\u043d.'+order.total+' - '+order.name,content:content,template:'html'})})}catch(e){console.log('\u901a\u77e5\u53d1\u9001\u5931\u8d25:',e)}}
function showQR(){let url=window.location.href.split('?')[0];document.getElementById('qrModalImg').src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url);document.getElementById('qrModalUrl').textContent=url;document.getElementById('qrModal').style.display='flex';}
function closeQR(){document.getElementById('qrModal').style.display='none';}
renderHome();updateBadge();
setTimeout(()=>flushPendingSheets(),1200);
